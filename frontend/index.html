<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Campus Navigation</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/winamp.css">
  <link rel="stylesheet" href="css/terminal.css">
</head>

<body>

  <!-- MAP -->
  <div id="map"></div>

  <!-- ================= WINAMP PANEL ================= -->
  <div class="winamp-player-container">

    <!-- HEADER -->
    <div class="player-header">
      <div class="header-bars"></div>
      <span class="header-title">CAMPUS NAVIGATION</span>
    </div>

    <!-- CONTROLS -->
    <div class="controls-block">

      <!-- START -->
      <div class="input-group">
        <label for="start">Start Node</label>
        <select id="start">
          <option>Loading...</option>
        </select>
      </div>

      <!-- END -->
      <div class="input-group">
        <label for="end">End Node</label>
        <select id="end">
          <option>Loading...</option>
        </select>
      </div>

      <!-- ALGO -->
      <div class="input-group">
        <label for="algo">Algorithm</label>
        <select id="algo">
          <option value="dijkstra">Dijkstra</option>
          <option value="astar">A*</option>
          <option value="bellman">Bellman-Ford</option>
          <option value="floyd">Floyd-Warshall</option>
          <option value="kshortest">K-Shortest</option>
        </select>
      </div>

      <!-- BUTTON -->
      <button id="findRoute">Find Route</button>

    </div>

    <!-- ROUTES -->
    <div class="radio-stack" id="routes">
      <p style="font-size:11px;color:#888;">Routes will appear here</p>
    </div>

    <!-- STATUS -->
    <div class="status-line">
      <span id="status-distance">Distance: --</span>
      <span id="status-algo">Algo: --</span>
    </div>

    <div class="screen-overlay"></div>

  </div>

  <!-- ================= TERMINAL (TOP RIGHT) ================= -->
  <div style="
    position:absolute;
    top:20px;
    right:20px;
    z-index:2000;
  ">

    <div class="card">
      <div class="header">
        <div class="title">Algorithm Steps</div>
      </div>

      <div class="footer" id="terminalOutput" style="overflow-y:auto; max-height:120px;">
        <div class="code">
          <span class="text">Waiting for route...</span>
        </div>
      </div>
    </div>

  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- JS -->
  <script src="js/map.js"></script>

</body>
</html>
